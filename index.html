<!doctype html>
<html lang="en-BD">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Solution Point Pro - The premium AI-powered digital growth agency in Bangladesh. Expert in Website Design, SEO, Facebook Ads, and Branding."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Web Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Colors -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a1628"
      media="(prefers-color-scheme: dark)"
    />

    <!-- SEO -->
    <title>Solution Point Pro | Premium Digital Agency in Bangladesh</title>

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Solution Point Pro | Digital Growth Agency"
    />
    <meta
      property="og:description"
      content="AI-Powered Website Design, Branding & Marketing for businesses in Bangladesh."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
